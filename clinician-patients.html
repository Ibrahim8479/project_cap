<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient List - PhysioTrack</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/clinician.css" />
</head>
<body class="app-page">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="images/logo.svg" class="nav-logo" alt="logo">
      <span class="brand-text">PhysioTrack</span>
    </div>
    <nav class="sidebar-nav">
      <a href="clinician.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="clinician-patients.html" class="nav-item active"><span class="nav-icon">👥</span> Patient List</a>
      <a href="clinician-patient.html" class="nav-item"><span class="nav-icon">👤</span> Patient View</a>
      <a href="messages.html" class="nav-item"><span class="nav-icon">✉</span> Messages</a>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="userChip">
        <div class="user-avatar" id="userAvatar" style="background: linear-gradient(135deg,#7c3aed,#00e5ff);">D</div>
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-role" id="userRole"></div>
        </div>
      </div>
      <a href="php/logout.php" class="btn btn-ghost btn-sm">Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="hamburger" id="sidebarToggle">☰</button>
      <div class="topbar-left">
        <h1 class="page-title">Patient List</h1>
        <span class="text-muted" style="font-size:.875rem;">Manage therapy progress and live sessions</span>
      </div>
      <div class="topbar-right">
        <span class="badge badge-teal">Clinic Mode</span>
        <div class="user-avatar" style="background: linear-gradient(135deg,#7c3aed,#00e5ff);">D</div>
      </div>
    </header>

    <div class="content-area">
      <div class="card patient-list-card">
        <div class="card-header">
          <span>Patient List</span>
          <div class="flex gap-1">
            <input class="form-control" type="text" placeholder="Search…" id="patientSearch" style="padding:.3rem .75rem; font-size:.8rem;" />
            <select class="form-control" id="adherenceFilter" style="padding:.3rem .5rem; font-size:.8rem; width:auto;">
              <option value="">All</option>
              <option value="high">High Adherence</option>
              <option value="low">Needs Attention</option>
            </select>
          </div>
        </div>

        <table class="session-table patient-table" id="patientTable">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Last Session</th>
              <th>Adherence</th>
              <th>Quality</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="patientTbody">
            <!-- rows will be populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/clinician.js"></script>
</body>
</html>
