<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - PhysioTrack</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="app-page">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="images/logo.svg" class="nav-logo" alt="logo">
      <span class="brand-text">PhysioTrack</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="session.html" class="nav-item"><span class="nav-icon">▶</span> Start Session</a>
      <a href="exercises.html" class="nav-item"><span class="nav-icon">🏋</span> My Exercises</a>
      <a href="progress.html" class="nav-item"><span class="nav-icon">📈</span> Progress</a>
      <a href="messages.html" class="nav-item"><span class="nav-icon">✉</span> Messages</a>
      <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar"></div>
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-role" id="userRole"></div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="hamburger" id="sidebarToggle">☰</button>
      <div class="topbar-left">
        <h1 class="page-title">Settings</h1>
        <span class="text-muted" style="font-size:.875rem;">Manage your profile and session preferences</span>
      </div>
      <div class="topbar-right">
        <span class="badge badge-warning">Account</span>
        <div class="user-avatar" style="background: linear-gradient(135deg,var(--teal),var(--violet));">A</div>
      </div>
    </header>

    <div class="content-area">
      <div class="card session-history-card">
        <div class="card-header"><span>Account Settings</span></div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" type="text" id="accountFullName" name="full_name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" id="accountEmail" name="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input class="form-control" type="tel" id="accountPhone" name="phone" />
        </div>
        <button id="saveSettingsBtn" class="btn btn-primary">Save Changes</button>
      </div>

      <div class="session-table card" style="padding:1.5rem;">
        <div class="card-header"><span>Preferences</span></div>
        <div class="form-group">
          <label class="checkbox-label"><input type="checkbox" id="prefReceiveReminders" /> Receive session reminders</label>
        </div>
        <div class="form-group">
          <label class="checkbox-label"><input type="checkbox" id="prefRealtimeFeedback" /> Enable real-time feedback prompts</label>
        </div>
        <div class="form-group">
          <label class="checkbox-label"><input type="checkbox" id="prefDarkMode" /> Dark mode (coming soon)</label>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
