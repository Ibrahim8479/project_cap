<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - PhysioTrack</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-layout">
    <div class="auth-left">
      <div class="auth-brand">
        <span class="nav-logo">⟁</span>
        <span class="nav-name">PhysioTrack</span>
      </div>
      <div class="auth-left-body">
        <h2>Password help is on the way.</h2>
        <p>Enter your email and we’ll send a reset link.</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-wrap">
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-sub">Remembered your password? <a href="login.html">Sign in</a></p>

        <form id="forgotForm">
          <div class="form-group">
            <label class="form-label" for="forgotEmail">Email Address</label>
            <input class="form-control" type="email" id="forgotEmail" placeholder="you@example.com" required />
          </div>
          <div id="forgotMessage" class="form-error" style="display:none;"></div>
          <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/forgot.js"></script>
</body>
</html>
